esphome:
  name: "bleproxy-via-uart"
  friendly_name: "BLE Proxy Via UART"
  project:
    name: "Sengled.E39-G8C"
    version: "1.0.0"
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

api:
  port: 6053

mdns:
  disabled: true

network:
  enable_ipv6: false

uart:
  id: uart_ble
  tx_pin: GPIO7
  rx_pin: GPIO6
  baud_rate: 230400
  rx_buffer_size: 1024

esp32_ble_tracker:
  scan_parameters:
    active: false

bluetooth_proxy:
  active: false
  connection_slots: 4

#switch:
#  - platform: gpio
#    id: led
#    pin: GPIO8
#
#interval:
#  - interval: 1s
#    then:
#      - switch.toggle: led

logger:
  baud_rate: 0

external_components:
  - source:
      type: local
      path: components
    components: [uart_api]

uart_api:
  uart_id: uart_ble
  api_port: 6053
  rx_buffer_size: 512
#  status_pin:
#    number: GPIO8
#    inverted: true
  debug_echo: false
